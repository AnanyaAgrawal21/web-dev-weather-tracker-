<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="weather
.css">
</head>

<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="container">

<div class="card">

<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="getWeather()">Search</button>

<h3>Search History</h3>
<div id="history"></div>

</div>


<div class="card">

<h3>Weather Info</h3>

<div class="info">City : <span id="city"></span></div>
<div class="info">Temp : <span id="temp"></span></div>
<div class="info">Weather : <span id="weather"></span></div>
<div class="info">Humidity : <span id="humidity"></span></div>
<div class="info">Wind : <span id="wind"></span></div>

</div>

</div>


<div class="console">
<h3>Console – Event Loop</h3>
<div id="log"></div>
</div>

<script src="weather.js"></script>

</body>
</html>
